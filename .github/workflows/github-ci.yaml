name: "C/C++ CI"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v3

    - name: build
      shell: bash
      run: cd install && ./install-debian.sh

  build-macos:
    runs-on: macos-latest
    steps:
    - name: checkout
      uses: actions/checkout@v3

    - name: build
      shell: bash
      run: cd install && chmod +x install-zerobuild-macos.sh && ./install-zerobuild-macos.sh

    - name: Upload macOS Binaries
      uses: actions/upload-artifact@v4
      with:
        name: l1vm-macos
        path: ~/l1vm/bin
